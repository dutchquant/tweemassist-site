<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TweemAssist — Bets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #07070e;
      --surface: #0e0e18;
      --border:  rgba(255,255,255,0.06);
      --accent:  #ff8c00;
      --white:   #f0f0f5;
      --muted:   #4a4a5a;
      --green:   #00e87a;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s;
      mix-blend-mode: screen;
    }

    .cursor-trail {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(255,140,0,0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease;
    }

    canvas.bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(7,7,14,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { font-size: 18px; font-weight: 800; color: var(--white); }
    .nav-logo span { color: var(--accent); }
    .nav-links { display:flex; gap:32px; list-style:none; }
    .nav-links a {
      font-size: 13px; font-weight: 700;
      color: var(--muted); text-decoration: none;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .page {
      position: relative;
      z-index: 1;
      padding: 120px 48px 80px;
      max-width: 800px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .page-title span { color: var(--accent); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--green);
      background: rgba(0,232,122,0.08);
      border: 1px solid rgba(0,232,122,0.2);
      border-radius: 20px;
      padding: 6px 14px;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* BET FEED */
    .bets-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bet-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.35s ease;
      transition: border-color 0.2s;
    }

    .bet-item:hover { border-color: rgba(255,140,0,0.2); }

    @keyframes slideIn {
      from { opacity:0; transform:translateY(-10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .bet-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--border);
    }

    .bet-avatar-placeholder {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,140,0,0.1);
      border: 1px solid rgba(255,140,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .bet-info { flex: 1; min-width: 0; }

    .bet-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .bet-username {
      font-size: 13px;
      font-weight: 700;
      color: var(--white);
    }

    .bet-metric {
      font-size: 11px;
      font-weight: 700;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      background: rgba(255,140,0,0.1);
      border: 1px solid rgba(255,140,0,0.2);
      border-radius: 4px;
      padding: 2px 7px;
    }

    .bet-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bet-tweet {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-decoration: none;
      transition: color 0.2s;
      max-width: 300px;
    }

    .bet-tweet:hover { color: var(--accent); }

    .bet-time {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* COPY BET BUTTON */
    .copy-bet-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: rgba(255,140,0,0.08);
      border: 1px solid rgba(255,140,0,0.2);
      border-radius: 6px;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      text-decoration: none;
    }

    .copy-bet-btn:hover {
      background: rgba(255,140,0,0.18);
      border-color: rgba(255,140,0,0.5);
      transform: translateY(-1px);
    }

    .copy-bet-btn.fired {
      background: rgba(0,232,122,0.1);
      border-color: rgba(0,232,122,0.3);
      color: var(--green);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .empty-state div { font-size: 32px; margin-bottom: 12px; }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo { font-size: 14px; font-weight: 800; }
    .footer-logo span { color: var(--accent); }
    .footer-links { display:flex; gap:24px; list-style:none; }
    .footer-links a { font-size:12px; font-family:'DM Mono',monospace; color:var(--muted); text-decoration:none; transition:color 0.2s; }
    .footer-links a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>
  <canvas class="bg-canvas" id="bgCanvas"></canvas>

  <nav>
    <div class="nav-logo">Tweem<span>Assist</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="live.html">Live</a></li>
      <li><a href="bets.html" class="active">Bets</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="privacy.html">Privacy</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Live<br><span>Bets</span></h1>
      <div class="live-badge">
        <div class="live-dot"></div>
        Real-time
      </div>
    </div>

    <div class="bets-list" id="betsList">
      <div class="empty-state">
        <div>🎯</div>
        Connecting to live feed...
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">Tweem<span>Assist</span></div>
    <ul class="footer-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="privacy.html">Privacy</a></li>
    </ul>
  </footer>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    const trail  = document.getElementById('cursorTrail');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
      setTimeout(() => { trail.style.left = e.clientX + 'px'; trail.style.top = e.clientY + 'px'; }, 80);
    });

    // Background canvas
    const canvas = document.getElementById('bgCanvas');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [], mx = 500, my = 500;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function initParticles() {
      particles = Array.from({ length: Math.floor(W*H/20000) }, () => ({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.2+0.3,
        vx: (Math.random()-0.5)*0.25, vy: (Math.random()-0.5)*0.25,
        a: Math.random()*0.4+0.1,
      }));
    }
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
    function draw() {
      ctx.clearRect(0,0,W,H);
      const g = ctx.createRadialGradient(mx,my,0,mx,my,280);
      g.addColorStop(0,'rgba(255,140,0,0.035)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      particles.forEach(p => {
        const dx=mx-p.x, dy=my-p.y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<180){ p.vx+=dx/d*0.008; p.vy+=dy/d*0.008; }
        p.vx*=0.98; p.vy*=0.98; p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,140,0,${p.a})`; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); initParticles(); draw();
    window.addEventListener('resize', () => { resize(); initParticles(); });

    // ── LIVE BETS FEED ──
    const SERVER   = 'https://tweemassist-server.onrender.com';
    const betsList = document.getElementById('betsList');
    const MAX_BETS = 50;
    let bets       = [];

    function timeAgo(ts) {
      const sec = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
      if (sec < 60)  return `${sec}s ago`;
      if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
      return `${Math.floor(sec/3600)}h ago`;
    }

    function metricLabel(metric, multiplier) {
      if (metric === 'tweem_site') return '🎯 via Tweem';
      return `${multiplier}x ${metric}`;
    }

    function makeBetEl(bet) {
      const div = document.createElement('div');
      div.className = 'bet-item';

      const tweetId  = bet.tweet_url?.match(/status\/(\d+)/)?.[1] || '';
      const shortUrl = bet.tweet_url?.replace('https://x.com/','x.com/').replace('https://twitter.com/','x.com/') || '';
      const label    = metricLabel(bet.metric, bet.multiplier);

      // Build reply text for copy bet
      const replyText = bet.metric !== 'tweem_site'
        ? `@tweem ${bet.multiplier}x ${bet.metric}`
        : '@tweem';

      const intentUrl = tweetId
        ? `https://x.com/intent/tweet?in_reply_to=${tweetId}&text=${encodeURIComponent(replyText)}`
        : '#';

      div.innerHTML = `
        ${bet.pic
          ? `<img class="bet-avatar" src="${bet.pic}" onerror="this.style.display='none'" />`
          : `<div class="bet-avatar-placeholder">🎯</div>`
        }
        <div class="bet-info">
          <div class="bet-top">
            <span class="bet-username">${bet.username || 'Anonymous'}</span>
            <span class="bet-metric">${label}</span>
          </div>
          <div class="bet-bottom">
            <a class="bet-tweet" href="${bet.tweet_url}" target="_blank" rel="noopener">${shortUrl}</a>
            <span class="bet-time">${timeAgo(bet.created_at)}</span>
          </div>
        </div>
        ${tweetId && bet.metric !== 'tweem_site' ? `
          <button class="copy-bet-btn" onclick="copyBet(this, '${intentUrl}')">
            🎯 Copy Bet
          </button>
        ` : ''}
      `;
      return div;
    }

    function copyBet(btn, intentUrl) {
      window.open(intentUrl, '_blank');
      btn.classList.add('fired');
      btn.textContent = '✓ Copied!';
      setTimeout(() => {
        btn.classList.remove('fired');
        btn.innerHTML = '🎯 Copy Bet';
      }, 2000);
    }

    function renderBets() {
      if (!bets.length) {
        betsList.innerHTML = `
          <div class="empty-state">
            <div>🎯</div>
            No bets yet — install TweemAssist and be the first!
          </div>`;
        return;
      }
      betsList.innerHTML = '';
      bets.forEach(b => betsList.appendChild(makeBetEl(b)));
    }

    function addNewBet(bet) {
      bets.unshift(bet);
      if (bets.length > MAX_BETS) bets.pop();

      // Add to top of list with animation
      const el = makeBetEl(bet);
      if (betsList.firstChild?.classList?.contains('empty-state')) {
        betsList.innerHTML = '';
      }
      betsList.insertBefore(el, betsList.firstChild);

      // Remove oldest if over limit
      while (betsList.children.length > MAX_BETS) {
        betsList.removeChild(betsList.lastChild);
      }
    }

    // Load initial bets
    async function loadInitial() {
      try {
        const res  = await fetch(`${SERVER}/recent-bets`);
        const data = await res.json();
        bets = data.bets || [];
        renderBets();
      } catch {
        betsList.innerHTML = `<div class="empty-state"><div>⚠️</div>Could not connect. Try again later.</div>`;
      }
    }

    // SSE — real-time new bets
    function connectSSE() {
      const es = new EventSource(`${SERVER}/live-bets-stream`);

      es.onmessage = (e) => {
        try {
          const bet = JSON.parse(e.data);
          if (bet.type === 'ping') return; // keepalive
          addNewBet(bet);
        } catch {}
      };

      es.onerror = () => {
        // Reconnect after 3 seconds
        es.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // Update time labels every 30 seconds
    setInterval(() => {
      document.querySelectorAll('.bet-time').forEach((el, i) => {
        if (bets[i]) el.textContent = timeAgo(bets[i].created_at);
      });
    }, 30000);

    loadInitial();
    connectSSE();
  </script>
</body>
</html>
