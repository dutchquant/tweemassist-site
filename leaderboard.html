<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TweemAssist — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #07070e;
      --surface: #0e0e18;
      --border:  rgba(255,255,255,0.06);
      --accent:  #ff8c00;
      --white:   #f0f0f5;
      --muted:   #4a4a5a;
      --green:   #00e87a;
      --gold:    #ffd700;
      --silver:  #c0c0c0;
      --bronze:  #cd7f32;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s;
      mix-blend-mode: screen;
    }

    .cursor-trail {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(255,140,0,0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease;
    }

    canvas.bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(7,7,14,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { font-size: 18px; font-weight: 800; color: var(--white); }
    .nav-logo span { color: var(--accent); }
    .nav-links { display:flex; gap:32px; list-style:none; }
    .nav-links a {
      font-size: 13px; font-weight: 700;
      color: var(--muted); text-decoration: none;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .page {
      position: relative;
      z-index: 1;
      padding: 120px 48px 80px;
      max-width: 800px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-title {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .page-title span { color: var(--accent); }

    /* FILTER TABS */
    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }

    .filter-tab {
      padding: 6px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      background: transparent;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tab.active {
      background: var(--accent);
      color: #000;
    }

    .filter-tab:hover:not(.active) { color: var(--white); }

    

    .podium-rank {
      position: absolute;
      top: 10px; right: 12px;
      font-size: 18px;
    }

    /* LEADERBOARD LIST */
    .lb-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .lb-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .lb-item:hover {
      border-color: rgba(255,140,0,0.15);
      transform: translateX(3px);
    }

    .lb-rank {
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      width: 28px;
      flex-shrink: 0;
      text-align: center;
    }

    .lb-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .lb-avatar-placeholder {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,140,0,0.1);
      border: 1px solid rgba(255,140,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .lb-name {
      flex: 1;
      font-size: 14px;
      font-weight: 700;
    }

    .lb-bets {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
    }

    .lb-top-1 { border-color: rgba(255,215,0,0.3) !important; background: linear-gradient(135deg, #0e0e18 0%, #141408 100%) !important; }
    .lb-top-2 { border-color: rgba(192,192,192,0.2) !important; }
    .lb-top-3 { border-color: rgba(205,127,50,0.2) !important; }

    .lb-bets span {
      color: var(--muted);
      font-weight: 400;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .empty-state div { font-size: 32px; margin-bottom: 12px; }

    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      height: 60px;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo { font-size: 14px; font-weight: 800; }
    .footer-logo span { color: var(--accent); }
    .footer-links { display:flex; gap:24px; list-style:none; }
    .footer-links a { font-size:12px; font-family:'DM Mono',monospace; color:var(--muted); text-decoration:none; transition:color 0.2s; }
    .footer-links a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>
  <canvas class="bg-canvas" id="bgCanvas"></canvas>

  <nav>
    <div class="nav-logo">Tweem<span>Assist</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="live.html">Live</a></li>
      <li><a href="bets.html">Bets</a></li>
      <li><a href="leaderboard.html" class="active">Leaderboard</a></li>
      <li><a href="privacy.html">Privacy</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Leader<br><span>board</span></h1>
      <div class="filter-tabs">
        <button class="filter-tab active" data-period="alltime">All Time</button>
        <button class="filter-tab" data-period="weekly">Weekly</button>
        <button class="filter-tab" data-period="monthly">Monthly</button>
      </div>
    </div>

    <div class="lb-list" id="lbList">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">Tweem<span>Assist</span></div>
    <ul class="footer-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="bets.html">Bets</a></li>
      <li><a href="privacy.html">Privacy</a></li>
    </ul>
  </footer>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    const trail  = document.getElementById('cursorTrail');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
      setTimeout(() => { trail.style.left = e.clientX + 'px'; trail.style.top = e.clientY + 'px'; }, 80);
    });

    // Background
    const canvas = document.getElementById('bgCanvas');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [], mx = 500, my = 500;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function initParticles() {
      particles = Array.from({ length: Math.floor(W*H/20000) }, () => ({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.2+0.3,
        vx: (Math.random()-0.5)*0.25, vy: (Math.random()-0.5)*0.25,
        a: Math.random()*0.4+0.1,
      }));
    }
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
    function draw() {
      ctx.clearRect(0,0,W,H);
      const g = ctx.createRadialGradient(mx,my,0,mx,my,280);
      g.addColorStop(0,'rgba(255,140,0,0.035)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      particles.forEach(p => {
        const dx=mx-p.x, dy=my-p.y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<180){ p.vx+=dx/d*0.008; p.vy+=dy/d*0.008; }
        p.vx*=0.98; p.vy*=0.98; p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,140,0,${p.a})`; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); initParticles(); draw();
    window.addEventListener('resize', () => { resize(); initParticles(); });

    // Leaderboard
    const SERVER  = 'https://tweemassist-server.onrender.com';
    let activePeriod = 'alltime';

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activePeriod = tab.dataset.period;
        loadLeaderboard(activePeriod);
      });
    });

    function avatarHtml(user, size = 36) {
      if (user.x_pic) return `<img class="${size > 40 ? 'podium' : 'lb'}-avatar" src="${user.x_pic}" onerror="this.outerHTML='<div class=\'${size > 40 ? 'podium' : 'lb'}-avatar-placeholder\'>🎯</div>'" />`;
      return `<div class="${size > 40 ? 'podium' : 'lb'}-avatar-placeholder">🎯</div>`;
    }



    const rankEmoji = { 1: '🥇', 2: '🥈', 3: '🥉' };

    function renderList(users) {
      const list = document.getElementById('lbList');
      if (!users.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div>🏆</div>
            No ranked players yet.<br>Login with X and start betting to claim your spot!
          </div>`;
        return;
      }

      list.innerHTML = users.map((u, i) => {
        const rank = i + 1;
        const isTop = rank <= 3;
        return `
          <div class="lb-item ${isTop ? 'lb-top-' + rank : ''}">
            <div class="lb-rank" style="color:${rank===1?'var(--gold)':rank===2?'var(--silver)':rank===3?'var(--bronze)':'var(--muted)'}">
              ${rankEmoji[rank] || String(rank).padStart(2,'0')}
            </div>
            ${u.x_pic
              ? `<img class="lb-avatar" src="${u.x_pic}" onerror="this.outerHTML='<div class=\'lb-avatar-placeholder\'>🎯</div>'" />`
              : `<div class="lb-avatar-placeholder">🎯</div>`
            }
            <div class="lb-name">@${u.x_username}</div>
            <div class="lb-bets">${u.bet_count} <span>bets</span></div>
          </div>
        `;
      }).join('');
    }

    async function loadLeaderboard(period = 'alltime') {
      const list = document.getElementById('lbList');
      list.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
      document.getElementById('podium').style.display = 'none';

      try {
        const res  = await fetch(`${SERVER}/leaderboard?period=${period}`);
        const data = await res.json();
        const lb   = data.leaderboard || [];

        renderList(lb);
      } catch {
        list.innerHTML = `<div class="empty-state"><div>⚠️</div>Could not load leaderboard.</div>`;
      }
    }

    loadLeaderboard('alltime');
  </script>
</body>
</html>
